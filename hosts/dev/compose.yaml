name: fldev

include:
  - ../../services/common/backbone/compose.yaml
  - ../../services/common/telemetry/compose.yaml

services:

  # These services doesn't expose some ports by default, hence we need to
  # explicitly expose them here for dev environment.

  postgres:
    ports:
      - 5432:5432

  rabbitmq:
    ports:
      - 5671:5671
      - 5672:5672

  redis:
    ports:
      - 6379:6379

  otelcol:
    ports:
      - 1888:1888   # pprof extension
      - 8888:8888   # Prometheus metrics exposed by the Collector
      - 8889:8889   # Prometheus exporter metrics
      - 13133:13133 # health_check extension
      - 4317:4317   # OTLP gRPC receiver
      - 4318:4318   # OTLP http receiver
      - 55679:55679 # zpages extension


# No extra volumes for dev atm
#  Note: Volumes defined in base compose.yaml files will be prefixed with
#  project's name, hence there is no name collisions.
# volumes:

networks:
  default:
    name: fldev
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.2.0/24
